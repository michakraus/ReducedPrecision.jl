name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

jobs:
  build:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Generate experiment figures
        # The docs embed the figures produced by the experiment scripts (written to plots/,
        # which is git-ignored). Generate them here — in the main project, instantiated by
        # julia-buildpkg — so they are available when the docs are built; make.jl copies them
        # from plots/ into the docs source tree. run_all.sh runs *every* experiment script, so
        # new examples (e.g. the Lotka–Volterra studies) are picked up automatically.
        run: bash scripts/run_all.sh
      - name: Build and deploy docs
        run: |
          julia --project=docs -e 'using Pkg; Pkg.instantiate()'
          julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
